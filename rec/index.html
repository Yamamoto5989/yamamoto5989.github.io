<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>画面録画</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2em;
      background: #f5f5f5;
    }
    h1 {
      margin-bottom: 1em;
    }
    video {
      margin: 1em 0;
      width: 80%;
      max-width: 800px;
      border: 2px solid #333;
      background: #000;
    }
    .controls {
      display: flex;
      gap: 1em;
    }
    button {
      padding: 0.6em 1.2em;
      font-size: 1rem;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    a.download-link {
      display: inline-block;
      margin-top: 1em;
      text-decoration: none;
      color: #fff;
      background: #007bff;
      padding: 0.6em 1.2em;
      border-radius: 4px;
    }
    .warning {
      color: #b00;
      margin-bottom: 1em;
      text-align: center;
      max-width: 600px;
    }
  </style>

  <script>
    // file:// から開くと secure context と認識されず、
    // getDisplayMedia が拒否される可能性があります。
    if (location.protocol === 'file:') {
      document.addEventListener('DOMContentLoaded', () => {
        const w = document.createElement('div');
        w.className = 'warning';
        w.innerHTML = `
          
        `;
        document.body.prepend(w);
      });
    }
  </script>
</head>

<body>
  <h1>画面録画</h1>
  <p>注：パソコンのみ対応です。Android、iOSでは使用できません。Firefoxで使用できない場合はChromeかEdgeで使用してみてください。</p>
  <div class="controls">
    <button id="startBtn">録画開始</button>
    <button id="stopBtn" disabled>録画停止</button>
  </div>

  <video id="preview" autoplay muted></video>

  <script>
    let mediaRecorder;
    let recordedChunks = [];
    let localStream;

    const startBtn = document.getElementById('startBtn');
    const stopBtn  = document.getElementById('stopBtn');
    const preview  = document.getElementById('preview');

    startBtn.addEventListener('click', async () => {
      try {
        // 1. 画面共有ダイアログを表示
        localStream = await navigator.mediaDevices.getDisplayMedia({
          video: { cursor: "always" },
          audio: true
        });
        preview.srcObject = localStream;

        // 2. MediaRecorder 初期化
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(localStream, {
          mimeType: 'video/webm; codecs=vp9'
        });

        mediaRecorder.ondataavailable = e => {
          if (e.data && e.data.size > 0) {
            recordedChunks.push(e.data);
          }
        };

        mediaRecorder.onstop = () => {
          // 停止時にダウンロードリンクを生成
          const blob = new Blob(recordedChunks, { type: 'video/webm' });
          const url  = URL.createObjectURL(blob);
          const a    = document.createElement('a');
          a.href     = url;
          a.download = 'screen-recording.webm';
          a.textContent = '録画ビデオをダウンロード';
          a.className = 'download-link';
          document.body.appendChild(a);
        };

        mediaRecorder.start(100); // 100msごとにデータ収集
        startBtn.disabled = true;
        stopBtn.disabled  = false;

      } catch (err) {
        console.error('画面共有エラー:', err);
        alert('画面共有の許可が必要です。');
      }
    });

    stopBtn.addEventListener('click', () => {
      // 録画停止
      mediaRecorder.stop();
      // すべてのトラックを停止
      localStream.getTracks().forEach(t => t.stop());

      startBtn.disabled = false;
      stopBtn.disabled  = true;
    });
  </script>
</body>
</html>
