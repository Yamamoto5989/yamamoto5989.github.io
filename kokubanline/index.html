<!--
<body>

    <h1>黒板ライン</h1>
    <div class="system-msg">200文字制限 / 5MBまでの画像送信可能 / 最大500件表示<br>誹謗中傷や法に触れること、許可なく他人の個人情報を送信することは絶対にやめてください。<br>この掲示板はインターネット上の誰でも閲覧できます。</div>
    
    <div id="postsContainer"></div>

    <div class="input-area">
        <input type="text" id="nameInput" placeholder="ペンネーム（20文字以内）" maxlength="20">
        <textarea id="contentInput" placeholder="メッセージを入力..." maxlength="200" oninput="updateCounter()"></textarea>
        <div class="counter"><span id="charCount">0</span> / 200文字</div>
        <div class="file-wrapper">
            <label>画像:</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        <button onclick="submitPost()">送信する</button>
    </div>

    <script>
        const API_URL = 'http://pkbk006-146.kcn.ne.jp:49152/api/posts';

        function updateCounter() {
            const len = document.getElementById('contentInput').value.length;
            document.getElementById('charCount').textContent = len;
        }

        // 修正：一番下までスクロールさせる命令（window.scrollTo）を削除しました
        function addAnchor(num) {
            const textarea = document.getElementById('contentInput');
            textarea.value = `>>${num} \n` + textarea.value;
            textarea.focus();
            updateCounter();
        }

        function jumpToPost(num) {
            const target = document.getElementById(`post-${num}`);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                target.classList.add('highlight');
                setTimeout(() => target.classList.remove('highlight'), 1500);
            } else {
                alert("メッセージが存在しません（500件を超えて削除された可能性があります）");
            }
        }

        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function processText(str) {
            if (!str) return '';
            
            let escaped = str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));

            escaped = escaped.replace(/&gt;&gt;(\d+)/g, (match, num) => {
                return `<a class="anchor-link" onclick="jumpToPost(${num})">&gt;&gt;${num}</a>`;
            });

            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return escaped.replace(urlRegex, (url) => {
                return `<a class="auto-link" href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
            });
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        function formatLocalTime(utcTimeString) {
            const utcDate = new Date(utcTimeString.replace(' ', 'T') + 'Z');
            return utcDate.toLocaleString();
        }

        async function fetchPosts() {
            try {
                const response = await fetch(API_URL, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const posts = await response.json();
                const container = document.getElementById('postsContainer');
                
                container.innerHTML = posts.map(post => {
                    const imgTag = post.image ? `<img src="${post.image}" class="post-img" />` : '';
                    return `
                        <div class="post" id="post-${post.id}">
                            <div class="post-header">
                                <div>
                                    <span class="num-link" onclick="addAnchor(${post.id})">#${post.id}</span>
                                    <span class="name">${escapeHTML(post.name)}</span>
                                </div>
                                <span class="date">${formatLocalTime(post.created_at)}</span>
                            </div>
                            <div class="content">${processText(post.content)}</div>
                            ${imgTag}
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error("データの取得に失敗しました:", e);
            }
        }

        async function submitPost() {
            const name = document.getElementById('nameInput').value;
            const content = document.getElementById('contentInput').value;
            const fileInput = document.getElementById('imageInput');
            const file = fileInput.files[0];
            
            let base64Image = null;

            if (content.length > 200) {
                alert("メッセージは200文字以内で入力してください。");
                return;
            }

            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    alert("画像サイズが5MBを超えています。");
                    return;
                }
                base64Image = await convertToBase64(file);
            }

            if (!content.trim() && !base64Image) {
                alert("メッセージを入力するか、画像を選択してください。");
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify({ name, content, image: base64Image })
                });

                if (response.ok) {
                    document.getElementById('contentInput').value = '';
                    fileInput.value = '';
                    updateCounter();
                    fetchPosts();
                } else {
                    alert("送信に失敗しました。");
                }
            } catch (e) {
                alert("サーバーと通信できませんでした。");
            }
        }

        fetchPosts();
        
        // 修正：1秒毎（1000ミリ秒）に自動読み込みをするよう変更しました
        setInterval(fetchPosts, 500);
    </script>
</body>
