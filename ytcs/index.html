<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>YouTube リアルタイム登録者数</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg:#05060a;
      --card:#071026;
      --text:#ffffff;
      --muted:#9fb3c8;
      --accent:#06b6d4;
    }
    [data-theme="light"]{
      --bg:#f6f8fb;
      --card:#ffffff;
      --text:#071026;
      --muted:#4b5563;
      --accent:#0ea5ff;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif}
    body{
      background:linear-gradient(180deg,var(--bg),#0b1220);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .app{
      width:100%;
      max-width:980px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:14px;
      padding:28px;
      box-shadow:0 10px 40px rgba(2,6,23,0.6);
      position:relative;
      overflow:hidden;
    }

    .topbar{
      display:flex;
      justify-content:flex-end;
      gap:12px;
      align-items:center;
      margin-bottom:12px;
    }
    .switch{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:14px;
      color:var(--muted);
    }
    .toggle{
      width:46px;height:26px;border-radius:20px;background:rgba(255,255,255,0.08);position:relative;cursor:pointer;
    }
    .knob{
      width:20px;height:20px;border-radius:50%;background:var(--card);position:absolute;top:3px;left:3px;transition:all .18s;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
    }
    [data-theme="light"] .toggle{background:rgba(2,6,23,0.06)}
    [data-theme="light"] .knob{left:23px;background:var(--accent)}

    .inputArea{display:block;text-align:center;padding:18px}
    .title{font-size:20px;margin-bottom:6px}
    .desc{color:var(--muted);margin-bottom:18px}
    .controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    input[type="text"]{
      width:420px;max-width:80%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);
      background:transparent;color:var(--text);font-size:16px;outline:none;
    }
    button{
      padding:12px 18px;border-radius:10px;border:none;background:var(--accent);color:#012;font-weight:700;cursor:pointer;
    }
    button.ghost{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.04)}
    .hint{color:var(--muted);margin-top:12px;font-size:13px}

    .displayArea{
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:8px;
      padding:40px 20px;
      min-height:360px;
    }
    .channelName{
      font-size:56px;
      font-weight:900;
      text-align:center;
      line-height:1;
      letter-spacing: -0.02em;
      word-break:break-word;
    }
    .subCount{
      font-size:140px;
      font-weight:900;
      margin-top:8px;
      text-align:center;
      letter-spacing:0.02em;
    }
    .channelIdSmall{font-size:16px;color:var(--muted);margin-top:8px}
    .smallBtnRow{display:flex;gap:12px;margin-top:18px;align-items:center}
    .smallBtn{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted);padding:8px 12px;border-radius:8px;cursor:pointer}

    .error{color:#ff7b7b;margin-top:12px}

    .hide-when-display{transition:opacity .18s}
    .display-mode .hide-when-display{opacity:0;pointer-events:none;height:0;overflow:hidden}

    @media (max-width:640px){
      .channelName{font-size:36px}
      .subCount{font-size:72px}
    }
  </style>
</head>
<body data-theme="dark">
  <div class="app" id="app">
    <div class="topbar hide-when-display" id="topbar">
      <div class="switch" title="ライト/ダーク切替">
        <div id="themeLabel">ダーク</div>
        <div class="toggle" id="themeToggle" role="button" tabindex="0" aria-pressed="false">
          <div class="knob"></div>
        </div>
      </div>
    </div>

    <div class="inputArea hide-when-display" id="inputArea">
      <div class="title">YouTube リアルタイム登録者数</div>
      <div class="desc">チャンネルの <code>@ハンドル</code> または <code>UCで始まるID</code> を入力してください</div>

      <div class="controls">
        <input id="inputField" type="text" placeholder="@example または UCxxxxxxxxxxxx" aria-label="チャンネル入力" />
        <button id="startBtn">表示する</button>
        <button id="clearBtn" class="ghost">クリア</button>
      </div>

      <div class="hint">表示中はチャンネル名と登録者数のみを大きく表示します。Escキーで戻ります。</div>
      <div id="inputError" class="error" style="display:none"></div>
    </div>

    <div class="displayArea" id="displayArea" aria-live="polite">
      <div id="channelName" class="channelName">チャンネル名</div>
      <div id="subCount" class="subCount">-</div>
      <div id="channelIdSmall" class="channelIdSmall">チャンネルID: UCxxxxxxxxxxxx</div>

      <div class="smallBtnRow">
        <button id="backBtn" class="smallBtn" title="戻る">戻る</button>
        <button id="toggleThemeSmall" class="smallBtn" title="ライト/ダーク切替">テーマ切替</button>
      </div>

      <div id="displayError" class="error" style="display:none"></div>
    </div>
  </div>

  <script>
    // --- YouTube Data API v3 キーをここに入れてください ---
    const API_KEY = "AIzaSyD_l2jYnrI2l7n-n9xqMePiFX-Asab-NnU";
    // -------------------------------------------------------

    const body = document.body;
    const app = document.getElementById("app");
    const inputArea = document.getElementById("inputArea");
    const displayArea = document.getElementById("displayArea");
    const inputField = document.getElementById("inputField");
    const startBtn = document.getElementById("startBtn");
    const clearBtn = document.getElementById("clearBtn");
    const backBtn = document.getElementById("backBtn");
    const channelNameEl = document.getElementById("channelName");
    const subCountEl = document.getElementById("subCount");
    const channelIdSmall = document.getElementById("channelIdSmall");
    const inputError = document.getElementById("inputError");
    const displayError = document.getElementById("displayError");
    const themeToggle = document.getElementById("themeToggle");
    const themeLabel = document.getElementById("themeLabel");
    const toggleThemeSmall = document.getElementById("toggleThemeSmall");
    const topbar = document.getElementById("topbar");

    let currentChannelId = null;
    let pollTimer = null;
    const POLL_INTERVAL = 5000; // 5秒ごとに更新（ユーザー指定）

    function setTheme(theme){
      body.setAttribute("data-theme", theme);
      themeLabel.textContent = theme === "light" ? "ライト" : "ダーク";
      themeToggle.setAttribute("aria-pressed", theme === "light" ? "true" : "false");
    }
    const saved = localStorage.getItem("yt_theme");
    setTheme(saved === "light" ? "light" : "dark");

    themeToggle.addEventListener("click", () => {
      const next = body.getAttribute("data-theme") === "light" ? "dark" : "light";
      localStorage.setItem("yt_theme", next);
      setTheme(next);
    });
    themeToggle.addEventListener("keydown", (e) => { if(e.key === "Enter" || e.key === " ") themeToggle.click(); });
    toggleThemeSmall.addEventListener("click", () => themeToggle.click());

    startBtn.addEventListener("click", onStart);
    clearBtn.addEventListener("click", () => { inputField.value = ""; inputError.style.display = "none"; });
    inputField.addEventListener("keydown", (e) => { if(e.key === "Enter") onStart(); });

    backBtn.addEventListener("click", () => { stopPolling(); exitDisplayMode(); });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        stopPolling();
        exitDisplayMode();
      }
    });

    function showInputError(msg){
      inputError.style.display = "block";
      inputError.textContent = msg;
    }
    function hideInputError(){
      inputError.style.display = "none";
      inputError.textContent = "";
    }
    function showDisplayError(msg){
      displayError.style.display = "block";
      displayError.textContent = msg;
    }
    function hideDisplayError(){
      displayError.style.display = "none";
      displayError.textContent = "";
    }

    async function onStart(){
      hideInputError();
      hideDisplayError();
      let raw = (inputField.value || "").trim();
      if(!raw){
        showInputError("チャンネルIDまたはハンドルを入力してください（例: @example または UCxxxxxxxxxxxx）");
        return;
      }
      if(raw.startsWith("@")) raw = raw.slice(1);

      if(raw.startsWith("UC")){
        currentChannelId = raw;
      } else {
        try {
          const searchUrl = "https://www.googleapis.com/youtube/v3/search"
            + "?part=snippet"
            + "&type=channel"
            + "&q=" + encodeURIComponent(raw)
            + "&maxResults=1"
            + "&key=" + encodeURIComponent(API_KEY);

          const r = await fetch(searchUrl);
          if(!r.ok) throw new Error("search API HTTP " + r.status);
          const j = await r.json();
          if(!j.items || j.items.length === 0) throw new Error("該当するチャンネルが見つかりません");
          currentChannelId = j.items[0].snippet.channelId;
        } catch (e) {
          showInputError("チャンネル検索に失敗しました: " + e.message);
          return;
        }
      }

      if(!currentChannelId){
        showInputError("チャンネルIDを解決できませんでした");
        return;
      }

      try {
        await fetchChannelInfoAndEnter(currentChannelId);
      } catch (e) {
        showInputError("チャンネル情報の取得に失敗しました: " + e.message);
      }
    }

    async function fetchChannelInfoAndEnter(channelId){
      hideInputError();
      const url = "https://www.googleapis.com/youtube/v3/channels"
        + "?part=snippet,statistics"
        + "&id=" + encodeURIComponent(channelId)
        + "&key=" + encodeURIComponent(API_KEY);

      const res = await fetch(url);
      if(!res.ok) throw new Error("channels API HTTP " + res.status);
      const data = await res.json();
      if(!data.items || !data.items[0]) throw new Error("チャンネルが見つかりません");

      const item = data.items[0];
      const title = item.snippet && item.snippet.title ? item.snippet.title : "（タイトル不明）";
      const stat = item.statistics && item.statistics.subscriberCount ? item.statistics.subscriberCount : null;

      channelNameEl.textContent = title;
      channelIdSmall.textContent = "チャンネルID: " + channelId;
      subCountEl.textContent = stat !== null ? Number(stat).toLocaleString("ja-JP") : "-";

      enterDisplayMode();
      stopPolling();
      // 5秒ごとに更新（POLL_INTERVAL = 5000）
      pollTimer = setInterval(pollStatistics, POLL_INTERVAL);
    }

    async function pollStatistics(){
      if(!currentChannelId) return;
      hideDisplayError();
      try {
        const url = "https://www.googleapis.com/youtube/v3/channels"
          + "?part=statistics"
          + "&id=" + encodeURIComponent(currentChannelId)
          + "&key=" + encodeURIComponent(API_KEY);

        const res = await fetch(url);
        if(!res.ok) throw new Error("HTTP " + res.status);
        const j = await res.json();
        if(!j.items || !j.items[0]) throw new Error("チャンネルが見つかりません");
        const count = j.items[0].statistics && j.items[0].statistics.subscriberCount ? j.items[0].statistics.subscriberCount : null;
        subCountEl.textContent = count !== null ? Number(count).toLocaleString("ja-JP") : "-";
      } catch (e) {
        showDisplayError("登録者数の取得に失敗しました: " + e.message);
      }
    }

    function stopPolling(){
      if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }
    }

    function enterDisplayMode(){
      app.classList.add("display-mode");
      inputArea.style.display = "none";
      topbar.style.display = "none";
      displayArea.style.display = "flex";
      backBtn.focus();
    }

    function exitDisplayMode(){
      app.classList.remove("display-mode");
      inputArea.style.display = "block";
      topbar.style.display = "flex";
      displayArea.style.display = "none";
      currentChannelId = null;
      stopPolling();
      inputField.focus();
    }

    inputField.focus();
  </script>
</body>
</html>
