<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>YouTube リアルタイム登録者数</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #05060a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      text-align: center;
      width: 100%;
      max-width: 600px;
      padding: 20px;
    }
    input {
      width: 80%;
      padding: 12px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      outline: none;
      margin-bottom: 16px;
    }
    button {
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #1e90ff;
      color: #fff;
    }
    .hidden { display: none; }
    .count {
      font-size: 64px;
      font-weight: bold;
      margin-top: 20px;
    }
    .label {
      font-size: 20px;
      opacity: 0.8;
    }
    .error {
      color: #ff6b6b;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- ▼ 初期画面：チャンネルID入力 -->
    <div id="inputScreen">
      <h2>YouTube リアルタイム登録者数</h2>
      <p>チャンネルID（UC〜）を入力してください</p>
      <input id="channelInput" placeholder="例: UCxxxxxxxxxxxx" />
      <br />
      <button onclick="start()">表示する</button>
      <div id="inputError" class="error"></div>
    </div>

    <!-- ▼ 表示画面：登録者数 -->
    <div id="displayScreen" class="hidden">
      <h2 id="channelLabel"></h2>
      <div class="label">現在の登録者数</div>
      <div id="subCount" class="count">-</div>
      <div id="displayError" class="error"></div>
      <button onclick="back()">戻る</button>
    </div>

  </div>

  <script>
    // ★ YouTube APIキーを入れてください
    const API_KEY = "AIzaSyD_l2jYnrI2l7n-n9xqMePiFX-Asab-NnU";

    const inputScreen = document.getElementById("inputScreen");
    const displayScreen = document.getElementById("displayScreen");
    const channelInput = document.getElementById("channelInput");
    const channelLabel = document.getElementById("channelLabel");
    const subCountEl = document.getElementById("subCount");
    const inputError = document.getElementById("inputError");
    const displayError = document.getElementById("displayError");

    let currentChannelId = null;
    let timer = null;

    function start() {
      const id = channelInput.value.trim();
      if (!id || !id.startsWith("UC")) {
        inputError.textContent = "正しいチャンネルID（UC〜）を入力してください";
        return;
      }

      inputError.textContent = "";
      currentChannelId = id;

      inputScreen.classList.add("hidden");
      displayScreen.classList.remove("hidden");

      channelLabel.textContent = "チャンネルID: " + id;

      update();
    }

    function back() {
      clearTimeout(timer);
      displayScreen.classList.add("hidden");
      inputScreen.classList.remove("hidden");
    }

    async function update() {
      try {
        displayError.textContent = "";
        const url =
          "https://www.googleapis.com/youtube/v3/channels" +
          "?part=statistics" +
          "&id=" + encodeURIComponent(currentChannelId) +
          "&key=" + encodeURIComponent(API_KEY);

        const res = await fetch(url);
        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();
        if (!data.items || !data.items[0]) {
          throw new Error("チャンネルが見つかりません");
        }

        const count = Number(data.items[0].statistics.subscriberCount)
          .toLocaleString("ja-JP");

        subCountEl.textContent = count;

      } catch (e) {
        displayError.textContent = "取得に失敗しました: " + e.message;
      }

      timer = setTimeout(update, 5000);
    }
  </script>

</body>
</html>
