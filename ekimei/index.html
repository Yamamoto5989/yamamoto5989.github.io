<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="UTF-8" lang="ja" / >
    <title>関西難読駅名クイズ</title>
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
     @font-face {
      font-family: 'GoogleSans';
      src: url('../GoogleSans-Medium.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
     }

     h1,h2 {
       font-family: 'GoogleSans';
       font-size: 7vw;
     }

     p {
       font-family: 'GoogleSans';
       font-size: 4vw;
     }
    </style>
  </head>
  <body>
    <h1>関西難読駅名クイズ</h1>
    <p>読み方クイズです</p>
    <p>漢字をクリックすると<br>ひらがなで答えが表示されます</p>
    <h2>
    <details><summary>柘植</summary>つげ</details><br>
    <details><summary>膳所</summary>ぜぜ</details><br>
    <details><summary>祝園</summary>ほうその</details><br>
    <details><summary>放出</summary>はなてん</details><br>
    <details><summary>餘部</summary>あまるべ</details><br>
    <details><summary>京終</summary>きょうばて</details><br>
    <details><summary>平城山</summary>ならやま</details><br>
    <details><summary>掖上</summary>わきがみ</details><br>
    <details><summary>朝来</summary>あっそ</details><br>
    <details><summary>布施屋</summary>ほしや</details><br>
    <details><summary>喜連瓜破</summary>きれうりわり</details><br>
    <details><summary>学文路</summary>かむろ</details><br>
    <details><summary>樟葉</summary>くずは</details><br>
    <details><summary>室生口大野</summary>むろうぐちおおの</details><br>
    </h2>
  </body>
</html>
