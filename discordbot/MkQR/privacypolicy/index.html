    <h1>プライバシーポリシー｜MkQR</h1>
    <ul>
      <li>収集されるデータ：Discordサーバー及びBOTとのDM内で収集されるされるデータはユーザーによって送信されたURLの文字情報のみです。それ以外のデータ（URL以外の送信内容、音声、ユーザー情報など）は無視され、利用しません。</li>
      <li>請求されるデータ：Yamamoto5989と私たちのグループ数人（以下、デベロッパー）がユーザーに対してデータを請求することはなく、ユーザーから送信されたURLの文字情報のみを利用します。</li>
      <li>第三者への共有：送信されたURLはデベロッパーのPCでのみ処理され、第三者へデータが共有されることはありません。</li>
    </ul>
