<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="ytforhtml_Icon.png">
  <link rel="apple-touch-icon" href="ytforhtml_Icon.png">
  <link rel="manifest" href="manifest.json">

  <title>YouTube for HTML</title>

  <script src="https://www.youtube.com/iframe_api"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f9f9f9;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    #search-form {
      display: flex;
      margin-bottom: 20px;
    }

    #search-input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
    }

    #search-form button {
      padding: 10px 20px;
      font-size: 16px;
      background: #cc0000;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    #search-form button:hover {
      background: #a30000;
    }

    .content {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    #results {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap: 15px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .video-item {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      border: 1px solid #ddd;
      background: #fff;
      transition: transform .1s, box-shadow .1s;
    }

    .video-item:hover {
      transform: scale(1.02);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .video-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
    }

    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-item h3 {
      margin: 8px;
      font-size: 14px;
      color: #333;
      line-height: 1.2;
    }

    #sentinel {
      width: 100%;
      height: 1px;
    }

    #player-section {
      position: sticky;
      top: 20px;
      height: calc(100vh - 40px);
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #player-container {
      position: relative;
      width: 100%;
      max-width: 640px;
      background: #000;
    }

    #player {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
    }

    #btn-maximize {
      width: 100%;
      padding: 10px;
      border: none;
      background: #222;
      color: white;
      cursor: pointer;
      font-size: 16px;
      display: none;
    }

    #btn-maximize:hover {
      background: #444;
    }

    #video-info {
      width: 100%;
      max-width: 640px;
      margin-top: 15px;
      background: #fff;
      padding: 15px;
      border: 1px solid #ddd;
      overflow-y: auto;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    #video-info h2 {
      margin: 0 0 10px;
      font-size: 20px;
      color: #111;
    }

    #video-info p {
      margin: 6px 0;
      color: #444;
      line-height: 1.5;
    }

    #comments-section {
      width: 100%;
      max-width: 640px;
      margin-top: 20px;
      background: #fff;
      border: 1px solid #ddd;
      padding: 15px;
      overflow-y: auto;
    }

    #comments-section h3 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #111;
    }

    .comment {
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }

    .comment-author {
      font-weight: bold;
      font-size: 14px;
      color: #333;
    }

    .comment-text {
      font-size: 14px;
      color: #444;
    }

    .comment-date {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #overlay-player-container {
      width: 90%;
      height: 90%;
      position: relative;
    }

    #overlay-player {
      width: 100%;
      height: 100%;
    }

    #btn-close {
      position: absolute;
      top: -50px;
      right: 0;
      background: red;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>YouTube for HTML</h1>

  <form id="search-form">
    <input type="text" id="search-input" placeholder="キーワードを入力">
    <button type="submit">検索</button>
  </form>

  <div class="content">

    <div id="results">
      <div id="sentinel"></div>
    </div>

    <div id="player-section">

      <div id="player-container">
        <div id="player"></div>

        <button id="btn-maximize">
          全画面表示
        </button>
      </div>

      <div id="video-info">
        <h2 id="video-title"></h2>
        <p id="video-description"></p>
        <p id="video-published"></p>
        <p id="video-views"></p>
      </div>

      <div id="comments-section">
        <h3>コメント</h3>
        <div id="comments">読み込み中…</div>
      </div>

    </div>

  </div>
</div>

<!-- オーバーレイ -->
<div id="overlay">
  <div id="overlay-player-container">

    <button id="btn-close">
      × 閉じる
    </button>

    <div id="overlay-player"></div>

  </div>
</div>

<script>

const API_KEY = 'AIzaSyD_l2jYnrI2l7n-n9xqMePiFX-Asab-NnU';

let smallPlayer;
let overlayPlayer;
let currentVideoId = '';

let nextPageToken = '';
let isLoading = false;
let currentQuery = '';

function onYouTubeIframeAPIReady() {

  smallPlayer = new YT.Player('player', {
    playerVars: {
      autoplay: 0,
      controls: 1,
      rel: 0,
      modestbranding: 1
    }
  });

  overlayPlayer = new YT.Player('overlay-player', {
    host: 'https://youtube.com',
    playerVars: {
      autoplay: 0,
      controls: 1,
      rel: 0,
      modestbranding: 1
    }
  });
}

const form = document.getElementById('search-form');
const input = document.getElementById('search-input');
const results = document.getElementById('results');
const sentinel = document.getElementById('sentinel');

const btnMax = document.getElementById('btn-maximize');
const overlay = document.getElementById('overlay');
const btnClose = document.getElementById('btn-close');

form.addEventListener('submit', e => {

  e.preventDefault();

  const q = input.value.trim();

  if (!q) return;

  currentQuery = q;
  nextPageToken = '';

  results.querySelectorAll('.video-item')
    .forEach(el => el.remove());

  fetchAndAppend();
});

async function fetchAndAppend() {

  if (isLoading) return;

  isLoading = true;

  try {

    const url = new URL(
      'https://www.googleapis.com/youtube/v3/search'
    );

    url.searchParams.set('part', 'snippet');
    url.searchParams.set('type', 'video');
    url.searchParams.set('maxResults', '50');
    url.searchParams.set('q', currentQuery);
    url.searchParams.set('key', API_KEY);

    if (nextPageToken) {
      url.searchParams.set('pageToken', nextPageToken);
    }

    const res = await fetch(url);
    const data = await res.json();

    nextPageToken = data.nextPageToken || '';

    appendResults(data.items || []);

  } catch(err) {

    console.error(err);

  } finally {

    isLoading = false;
  }
}

function appendResults(items) {

  items.forEach(v => {

    const vid = v.id.videoId;
    const sn = v.snippet;

    const div = document.createElement('div');

    div.className = 'video-item';

    div.innerHTML = `
      <div class="video-thumb">
        <img src="${sn.thumbnails.medium.url}">
      </div>

      <h3>${sn.title}</h3>
    `;

    div.addEventListener('click', () => {
      playVideo(vid);
    });

    results.insertBefore(div, sentinel);
  });
}

const io = new IntersectionObserver(entries => {

  entries.forEach(entry => {

    if (entry.isIntersecting && nextPageToken) {
      fetchAndAppend();
    }
  });

}, {
  root: results,
  threshold: 1.0
});

io.observe(sentinel);

async function playVideo(videoId) {

  currentVideoId = videoId;

  smallPlayer.loadVideoById({
    videoId,
    startSeconds: 0
  });

  try {

    const url =
      `https://www.googleapis.com/youtube/v3/videos?` +
      `part=snippet,statistics&id=${videoId}&key=${API_KEY}`;

    const res = await fetch(url);
    const d = await res.json();

    const info = d.items[0].snippet;
    const st = d.items[0].statistics;

    document.getElementById('video-title').textContent =
      info.title;

    document.getElementById('video-description').textContent =
      info.description;

    document.getElementById('video-published').textContent =
      '投稿日: ' +
      new Date(info.publishedAt).toLocaleString();

    document.getElementById('video-views').textContent =
      '視聴回数: ' +
      Number(st.viewCount).toLocaleString();

  } catch {

    document.getElementById('video-title').textContent =
      '情報取得失敗';
  }

  fetchComments(videoId);

  document.getElementById('player-section')
    .scrollIntoView({
      behavior: 'smooth'
    });
}

async function fetchComments(videoId) {

  const ctn = document.getElementById('comments');

  ctn.textContent =
    'コメントを読み込んでいます…';

  try {

    const url =
      `https://www.googleapis.com/youtube/v3/commentThreads?` +
      `part=snippet&maxResults=10&textFormat=plainText&` +
      `videoId=${videoId}&key=${API_KEY}`;

    const res = await fetch(url);
    const d = await res.json();

    displayComments(d.items || [], ctn);

  } catch {

    ctn.innerHTML =
      '<p>コメントの読み込みに失敗しました。</p>';
  }
}

function displayComments(items, container) {

  container.innerHTML = '';

  if (!items.length) {

    container.innerHTML =
      '<p>コメントはまだありません。</p>';

    return;
  }

  items.forEach(it => {

    const s =
      it.snippet.topLevelComment.snippet;

    const dv = document.createElement('div');

    dv.className = 'comment';

    dv.innerHTML = `
      <div class="comment-author">
        ${s.authorDisplayName}
      </div>

      <div class="comment-text">
        ${s.textDisplay}
      </div>

      <div class="comment-date">
        ${new Date(s.publishedAt).toLocaleString()}
      </div>
    `;

    container.appendChild(dv);
  });
}

if (btnMax) {

  btnMax.addEventListener('click', () => {

    if (!currentVideoId) return;

    const time =
      smallPlayer.getCurrentTime();

    overlayPlayer.loadVideoById({
      videoId: currentVideoId,
      startSeconds: time
    });

    smallPlayer.pauseVideo();

    overlay.style.display = 'flex';
  });
}

if (btnClose) {

  btnClose.addEventListener('click', () => {

    const time =
      overlayPlayer.getCurrentTime();

    smallPlayer.loadVideoById({
      videoId: currentVideoId,
      startSeconds: time
    });

    overlayPlayer.stopVideo();

    overlay.style.display = 'none';
  });
}

</script>

</body>
</html>
